name: Daily Airwallex FYI

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These two slots cover 9am Australia/Sydney across AEST/AEDT.
    # GitHub can start scheduled jobs late, so each slot allows the 9am hour plus a
    # small 10am Sydney grace window, but only in its matching timezone period.
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"

permissions:
  contents: read

concurrency:
  group: airwallex-fyi-daily
  cancel-in-progress: false

jobs:
  run-once:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_DRIVER: org.postgresql.Driver
      AI_PROVIDER: gemini
      AI_MODEL: gemini-2.5-flash
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      WHATSAPP_TO: ""
      DIGEST_TIME_ZONE: Australia/Sydney
      DRY_RUN: "false"
      SCHEDULER_ENABLED: "false"

    steps:
      - name: Gate scheduled run to 9am Sydney
        id: schedule_gate
        shell: bash
        run: |
          sydney_time="$(TZ=Australia/Sydney date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "sydney_time=$sydney_time" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sydney_hour="$(TZ=Australia/Sydney date '+%H')"
          sydney_zone="$(TZ=Australia/Sydney date '+%Z')"
          schedule="${{ github.event.schedule }}"
          in_grace_window=false
          matching_schedule=false
          if [ "$sydney_hour" = "09" ] || [ "$sydney_hour" = "10" ]; then
            in_grace_window=true
          fi
          if [ "$schedule" = "0 22 * * *" ] && [ "$sydney_zone" = "AEDT" ]; then
            matching_schedule=true
          fi
          if [ "$schedule" = "0 23 * * *" ] && [ "$sydney_zone" = "AEST" ]; then
            matching_schedule=true
          fi

          if [ "$in_grace_window" = "true" ] && [ "$matching_schedule" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip outside 9am Sydney
        if: steps.schedule_gate.outputs.should_run != 'true'
        run: echo "Skipping daily digest; Sydney time is ${{ steps.schedule_gate.outputs.sydney_time }}."

      - name: Checkout
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Java
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Make Gradle wrapper executable
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: chmod +x ./gradlew

      - name: Run monitor once
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: ./gradlew --no-daemon bootRun --args="--run-once"
