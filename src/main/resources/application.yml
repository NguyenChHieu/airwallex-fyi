spring:
  application:
    name: airwallex-fyi
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:airwallex_fyi;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration

airwallex-fyi:
  ai:
    provider: ${AI_PROVIDER:gemini}
    model: ${AI_MODEL:gemini-2.5-flash}
  gemini:
    api-key: ${GEMINI_API_KEY:}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    whatsapp-from: ${TWILIO_WHATSAPP_FROM:}
  whatsapp:
    to: ${WHATSAPP_TO:}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
  digest:
    time-zone: ${DIGEST_TIME_ZONE:Australia/Sydney}
  scheduler:
    enabled: ${SCHEDULER_ENABLED:false}
    fixed-delay-ms: ${SCHEDULER_FIXED_DELAY:300000}
  source:
    sitemap-url: ${AIRWALLEX_SITEMAP_URL:https://www.airwallex.com/global/sitemap-blog.xml}
    first-run-seed-limit: ${FIRST_RUN_SEED_LIMIT:25}
  dry-run: ${DRY_RUN:true}
  admin:
    token: ${ADMIN_TOKEN:dev-admin-token}

---
spring:
  config:
    activate:
      on-profile: "!test"
    import: optional:file:.env[.properties]
